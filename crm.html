<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CRM Client — INVENIO × GALLETTI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--teal:#0d9488;--teal-l:#14b8a6;--navy:#0f2244;--navy-l:#1a3a6e;
      --card-bg:rgba(235,240,250,.92);--card-border:rgba(255,255,255,.6);--radius:16px;--radius-sm:10px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Outfit',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;color:#fff;
      background:radial-gradient(ellipse at 50% 0%,#1a3a6e 0%,#0f2244 35%,#091428 70%,#050d1a 100%);background-attachment:fixed}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;
      background:rgba(5,13,26,.4);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:100}
    .topbar-brand{display:flex;align-items:baseline;gap:10px}
    .topbar-brand h1{font-size:17px;font-weight:600;color:#fff;letter-spacing:2px}
    .topbar-brand span{font-size:11px;font-weight:300;color:var(--teal-l);letter-spacing:3px}
    .topbar-back{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.5);font-size:13px;text-decoration:none;transition:color .2s}
    .topbar-back:hover{color:#fff}
    .topbar-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5}
    .bg-glow{position:fixed;border-radius:50%;pointer-events:none;z-index:-1;filter:blur(80px)}
    .bg-glow--1{width:600px;height:600px;top:-200px;left:-100px;background:rgba(26,58,110,.5)}
    .bg-glow--2{width:400px;height:400px;bottom:-100px;right:-50px;background:rgba(13,148,136,.12)}
    .crm{max-width:960px;margin:0 auto;padding:40px 24px 80px}
    .crm-title{font-size:28px;font-weight:700;text-align:center;margin-bottom:8px}
    .crm-sub{font-size:14px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:32px}

    .search-wrap{position:relative;max-width:500px;margin:0 auto 32px}
    .search-input{width:100%;padding:14px 18px 14px 44px;border:1px solid rgba(255,255,255,.15);border-radius:var(--radius);
      font-family:'Outfit',sans-serif;font-size:15px;background:rgba(255,255,255,.08);color:#fff;outline:none;transition:all .2s}
    .search-input::placeholder{color:rgba(255,255,255,.3)}
    .search-input:focus{border-color:var(--teal-l);background:rgba(255,255,255,.12)}
    .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:rgba(255,255,255,.35);fill:none;stroke-width:1.5}
    .search-results{position:absolute;top:100%;left:0;right:0;background:rgba(235,240,250,.97);border:1px solid rgba(255,255,255,.6);
      border-radius:0 0 var(--radius) var(--radius);max-height:300px;overflow-y:auto;display:none;z-index:50}
    .search-results.open{display:block}
    .search-item{padding:12px 18px;cursor:pointer;transition:background .15s;border-bottom:1px solid #e5e7eb}
    .search-item:hover{background:rgba(13,148,136,.08)}
    .search-item:last-child{border-bottom:none}
    .search-item-name{font-size:14px;font-weight:500;color:var(--navy)}
    .search-item-code{font-size:12px;color:var(--navy-l);opacity:.6;font-family:'DM Mono',monospace}

    .card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
    .card-title{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .card-title-bar{width:3px;height:16px;border-radius:2px;background:var(--teal)}

    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .kpi{background:#f8fafc;border-radius:var(--radius-sm);padding:16px;text-align:center}
    .kpi-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:600;color:var(--navy)}
    .kpi-label{font-size:11px;color:var(--navy-l);opacity:.5;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
    .kpi-val.green{color:#059669}.kpi-val.amber{color:#d97706}.kpi-val.red{color:#dc2626}

    .score-section{display:flex;align-items:center;gap:20px;padding:16px 0;border-top:1px solid #e5e7eb;margin-top:8px}
    .score-ring{position:relative;width:80px;height:80px;flex-shrink:0}
    .score-ring svg{width:80px;height:80px;transform:rotate(-90deg)}
    .score-ring-bg{fill:none;stroke:#e5e7eb;stroke-width:6}
    .score-ring-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
    .score-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:20px;font-weight:600;color:var(--navy)}
    .score-info h4{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:4px}
    .score-info p{font-size:12px;color:var(--navy-l);opacity:.6;line-height:1.5}

    .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .chart-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px}
    .chart-wrap{position:relative;height:260px}

    .detail-panel{background:#f8fafc;border-radius:var(--radius-sm);padding:20px;margin-top:16px;display:none}
    .detail-panel.open{display:block}
    .detail-title{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:12px}
    .detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-bottom:16px}
    .detail-chip{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:all .15s}
    .detail-chip:hover{border-color:var(--teal)}
    .detail-chip.sel{border-color:var(--teal);background:#f0fdfa}
    .detail-chip-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:600;color:var(--navy)}
    .detail-chip-label{font-size:10px;color:var(--navy-l);opacity:.5;margin-top:2px}

    .opts-list{margin-top:12px}
    .opt-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #f3f4f6;font-size:13px}
    .opt-row:last-child{border-bottom:none}
    .opt-name{color:var(--navy);font-weight:500}
    .opt-cat{font-size:11px;color:var(--navy-l);opacity:.5}
    .opt-count{font-family:'DM Mono',monospace;font-size:13px;color:var(--teal);font-weight:500}

    .projets-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .projets-title{font-size:15px;font-weight:600;color:var(--navy)}
    .projets-count{font-size:12px;color:var(--navy-l);opacity:.5}
    .projets-table{width:100%;border-collapse:collapse;font-size:13px}
    .projets-table th{text-align:left;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--navy-l);opacity:.5;font-weight:500;border-bottom:1px solid #e5e7eb}
    .projets-table td{padding:10px;border-bottom:1px solid #f3f4f6;color:var(--navy)}
    .projets-table tr:hover td{background:#f8fafc}
    .projets-table .mono{font-family:'DM Mono',monospace;font-size:12px}
    .status{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:6px}
    .status-en_cours{background:#eff6ff;color:#1e40af}
    .status-gagne{background:#ecfdf5;color:#065f46}
    .status-perdu{background:#fef2f2;color:#991b1b}
    .status-abandonne{background:#f3f4f6;color:#6b7280}

    .top-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f3f4f6;cursor:pointer}
    .top-row:hover{background:#f8fafc;border-radius:6px}
    .top-row:last-child{border-bottom:none}
    .top-rank{font-family:'DM Mono',monospace;font-size:12px;color:var(--navy-l);opacity:.4;width:20px}
    .top-name{flex:1;font-size:13px;color:var(--navy);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .top-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--teal);font-weight:500}

    .empty{text-align:center;padding:48px 20px}
    .empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
    .empty-text{font-size:14px;color:var(--navy-l);opacity:.5}

    #clientView{display:none}#dashView{display:block}
    @media(max-width:700px){.kpi-grid{grid-template-columns:1fr 1fr}.chart-row{grid-template-columns:1fr}.score-section{flex-direction:column;text-align:center}}
  </style>
</head>
<body>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>
  <div class="topbar">
    <div class="topbar-brand"><h1>INVENIO</h1><span>GALLETTI</span></div>
    <a class="topbar-back" href="hub.html"><svg viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>Retour au hub</a>
  </div>
  <div class="crm">
    <div class="crm-title">CRM Client</div>
    <div class="crm-sub">Recherchez un client ou explorez les statistiques globales</div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Rechercher un client..." oninput="onSearch(this.value)"/>
      <div class="search-results" id="searchResults"></div>
    </div>

    <!-- ═══ DASHBOARD GLOBAL ═══ -->
    <div id="dashView">
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-val" id="dkClients">—</div><div class="kpi-label">Clients</div></div>
        <div class="kpi"><div class="kpi-val" id="dkProjets">—</div><div class="kpi-label">Projets</div></div>
        <div class="kpi"><div class="kpi-val green" id="dkGagnes">—</div><div class="kpi-label">Gagnés</div></div>
        <div class="kpi"><div class="kpi-val amber" id="dkConversion">—</div><div class="kpi-label">Taux conversion</div></div>
      </div>

      <!-- Charts -->
      <div class="chart-row">
        <div class="chart-card">
          <div class="card-title"><div class="card-title-bar"></div>Chiffrages par gamme</div>
          <div class="chart-wrap"><canvas id="chartGamme"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="card-title"><div class="card-title-bar"></div>Statut des affaires</div>
          <div class="chart-wrap"><canvas id="chartStatut"></canvas></div>
        </div>
      </div>

      <!-- Detail panel gamme → taille → options -->
      <div class="card">
        <div class="card-title"><div class="card-title-bar"></div>Détail par gamme</div>
        <div id="gammeSelector"></div>
        <div class="detail-panel" id="detailPanel">
          <div class="detail-title" id="detailTitle">Tailles chiffrées</div>
          <div class="detail-grid" id="detailTailles"></div>
          <div id="detailOptions"></div>
        </div>
      </div>

      <!-- Top clients -->
      <div class="chart-row">
        <div class="chart-card">
          <div class="card-title"><div class="card-title-bar"></div>Top clients par CA</div>
          <div id="topCA"></div>
        </div>
        <div class="chart-card">
          <div class="card-title"><div class="card-title-bar"></div>Top clients par volume</div>
          <div id="topVol"></div>
        </div>
      </div>
    </div>

    <!-- ═══ CLIENT VIEW ═══ -->
    <div id="clientView">
      <div class="card" id="clientCard"></div>
      <div class="card" id="kpiCard"></div>
      <div class="card" id="projetsCard"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="js/db.js"></script>
  <script>
    var searchTimeout=null,currentClientId=null,chartGammeInst=null,chartStatutInst=null;

    DB.init().then(function(ok){ if(ok) loadDashboard(); });

    // ── Search ──
    function onSearch(q){
      clearTimeout(searchTimeout);
      var box=document.getElementById('searchResults');
      if(!q||q.length<2){box.classList.remove('open');
        if(!q){document.getElementById('clientView').style.display='none';document.getElementById('dashView').style.display='block';currentClientId=null;}
        return;}
      searchTimeout=setTimeout(async function(){
        var rows=await DB.clients.search(q);
        if(rows.length===0){box.innerHTML='<div style="padding:14px;font-size:13px;color:#999;text-align:center">Aucun résultat</div>';}
        else{box.innerHTML=rows.slice(0,20).map(function(r){return'<div class="search-item" onclick="selectClient('+r.id+')"><div class="search-item-name">'+r.raison_sociale+'</div><div class="search-item-code">'+r.code_client+'</div></div>';}).join('');}
        box.classList.add('open');
      },250);
    }
    document.addEventListener('click',function(e){if(!e.target.closest('.search-wrap'))document.getElementById('searchResults').classList.remove('open');});

    // ══════════════════════════════════════════
    // DASHBOARD GLOBAL
    // ══════════════════════════════════════════
    async function loadDashboard(){
      var dash=await DB.stats.getDashboard();
      if(dash){
        document.getElementById('dkClients').textContent=(dash.total_clients||0).toLocaleString('fr-FR');
        document.getElementById('dkProjets').textContent=dash.total_projets||0;
        document.getElementById('dkGagnes').textContent=dash.gagnes||0;
        var conv=dash.total_projets>0?Math.round(100*(dash.gagnes||0)/dash.total_projets):0;
        document.getElementById('dkConversion').textContent=conv+'%';
      }

      // Chart: par gamme (HS vs CS)
      var gammeData=await DB.query("SELECT type_machine, COUNT(*) AS n FROM projets WHERE type_machine!='' GROUP BY type_machine ORDER BY type_machine");
      var gammeLabels=gammeData.map(function(r){return r.type_machine==='HS'?'PAC (HS)':'GEG (CS)';});
      var gammeVals=gammeData.map(function(r){return r.n;});
      var gammeColors=['#0d9488','#3b82f6','#f59e0b','#8b5cf6'];

      if(chartGammeInst)chartGammeInst.destroy();
      chartGammeInst=new Chart(document.getElementById('chartGamme'),{
        type:'doughnut',
        data:{labels:gammeLabels,datasets:[{data:gammeVals,backgroundColor:gammeColors.slice(0,gammeLabels.length),borderWidth:0,hoverOffset:6}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#0f2244',font:{family:'Outfit',size:12},padding:16}}}}
      });

      // Chart: statut
      var statutData=await DB.query("SELECT statut, COUNT(*) AS n FROM projets GROUP BY statut");
      var sMap={en_cours:'En cours',gagne:'Gagné',perdu:'Perdu',abandonne:'Abandonné'};
      var sColors={en_cours:'#3b82f6',gagne:'#059669',perdu:'#dc2626',abandonne:'#9ca3af'};
      var sLabels=statutData.map(function(r){return sMap[r.statut]||r.statut;});
      var sVals=statutData.map(function(r){return r.n;});
      var sCols=statutData.map(function(r){return sColors[r.statut]||'#666';});

      if(chartStatutInst)chartStatutInst.destroy();
      chartStatutInst=new Chart(document.getElementById('chartStatut'),{
        type:'bar',
        data:{labels:sLabels,datasets:[{data:sVals,backgroundColor:sCols,borderRadius:6,barThickness:40}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
          y:{beginAtZero:true,ticks:{color:'#1a3a6e',font:{family:'DM Mono',size:11}},grid:{color:'#e5e7eb'}},
          x:{ticks:{color:'#1a3a6e',font:{family:'Outfit',size:12}},grid:{display:false}}
        }}
      });

      // Gamme selector buttons
      var gammeButtons=await DB.query("SELECT DISTINCT type_machine FROM projets WHERE type_machine!='' ORDER BY type_machine");
      var gbH=gammeButtons.map(function(r){
        var label=r.type_machine==='HS'?'PAC (HS)':'GEG (CS)';
        return'<span class="detail-chip" onclick="loadGammeDetail(\''+r.type_machine+'\',this)" style="display:inline-block;padding:8px 20px;cursor:pointer"><span class="detail-chip-val" style="font-size:14px">'+label+'</span></span>';
      }).join(' ');
      document.getElementById('gammeSelector').innerHTML=gbH;

      // Top clients
      var topCA=await DB.stats.getTopClients(5);
      document.getElementById('topCA').innerHTML=renderTopList(topCA,'ca');
      var topVol=await DB.stats.getTopClients(10);
      topVol.sort(function(a,b){return b.nb_projets-a.nb_projets;});
      document.getElementById('topVol').innerHTML=renderTopList(topVol.slice(0,5),'vol');
    }

    function renderTopList(list,mode){
      if(!list||list.length===0)return'<div style="padding:16px;text-align:center;font-size:13px;color:#999">Aucune donnée</div>';
      return list.map(function(c,i){
        var val=mode==='ca'?formatCA(c.ca_gagne):c.nb_projets+' proj.';
        return'<div class="top-row" onclick="selectClient('+c.id+')"><span class="top-rank">'+(i+1)+'</span><span class="top-name">'+c.raison_sociale+'</span><span class="top-val">'+val+'</span></div>';
      }).join('');
    }

    // ══════════════════════════════════════════
    // DETAIL GAMME → TAILLE → OPTIONS
    // ══════════════════════════════════════════
    async function loadGammeDetail(type, el){
      // Highlight button
      document.querySelectorAll('#gammeSelector .detail-chip').forEach(function(c){c.classList.remove('sel');});
      if(el)el.classList.add('sel');

      var panel=document.getElementById('detailPanel');
      panel.classList.add('open');
      var label=type==='HS'?'PAC (HS)':'GEG (CS)';
      document.getElementById('detailTitle').textContent='Tailles chiffrées — '+label;

      // Tailles
      var tailles=await DB.query(
        "SELECT taille, COUNT(*) AS n, SUM(CASE WHEN statut='gagne' THEN 1 ELSE 0 END) AS gagnes, ROUND(AVG(montant_ht)) AS montant_moy "+
        "FROM projets WHERE type_machine=? AND taille!='' GROUP BY taille ORDER BY taille",[type]);

      var tH=tailles.map(function(t){
        return'<div class="detail-chip" onclick="loadTailleOptions(\''+type+'\',\''+t.taille+'\',this)">'+
          '<div class="detail-chip-val">'+t.taille+'</div>'+
          '<div class="detail-chip-label">'+t.n+' chiffrage'+(t.n>1?'s':'')+'</div></div>';
      }).join('');
      document.getElementById('detailTailles').innerHTML=tH;
      document.getElementById('detailOptions').innerHTML='<div style="padding:12px;font-size:13px;color:#999;text-align:center">Cliquez sur une taille pour voir les options</div>';
    }

    async function loadTailleOptions(type, taille, el){
      document.querySelectorAll('#detailTailles .detail-chip').forEach(function(c){c.classList.remove('sel');});
      if(el)el.classList.add('sel');

      // Stats de cette taille
      var stats=await DB.query(
        "SELECT COUNT(*) AS total, SUM(CASE WHEN statut='gagne' THEN 1 ELSE 0 END) AS gagnes, "+
        "ROUND(AVG(montant_ht)) AS montant_moy, ROUND(SUM(montant_ht)) AS ca_total "+
        "FROM projets WHERE type_machine=? AND taille=?",[type,taille]);
      var s=stats[0]||{};

      // Options les plus sélectionnées pour cette gamme/taille
      var opts=await DB.query(
        "SELECT o.designation, o.categorie, COUNT(*) AS nb_fois "+
        "FROM projets_options po "+
        "JOIN projets p ON po.projet_id=p.id "+
        "JOIN options o ON po.option_id=o.id "+
        "WHERE p.type_machine=? AND p.taille=? "+
        "GROUP BY o.id ORDER BY nb_fois DESC",[type,taille]);

      var h='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">';
      h+='<div class="kpi" style="padding:12px"><div class="kpi-val" style="font-size:18px">'+(s.total||0)+'</div><div class="kpi-label">Chiffrages</div></div>';
      h+='<div class="kpi" style="padding:12px"><div class="kpi-val green" style="font-size:18px">'+(s.gagnes||0)+'</div><div class="kpi-label">Gagnés</div></div>';
      h+='<div class="kpi" style="padding:12px"><div class="kpi-val" style="font-size:18px">'+formatCA(s.montant_moy)+'</div><div class="kpi-label">Montant moy.</div></div>';
      h+='</div>';

      if(opts.length>0){
        h+='<div class="detail-title">Options les plus sélectionnées</div>';
        h+='<div class="opts-list">';
        opts.forEach(function(o){
          h+='<div class="opt-row"><div><span class="opt-name">'+o.designation+'</span><br/><span class="opt-cat">'+o.categorie+'</span></div><span class="opt-count">'+o.nb_fois+'x</span></div>';
        });
        h+='</div>';
      } else {
        h+='<div style="padding:12px;font-size:13px;color:#999;text-align:center">Aucune option enregistrée</div>';
      }

      document.getElementById('detailOptions').innerHTML=h;
    }

    // ══════════════════════════════════════════
    // CLIENT VIEW
    // ══════════════════════════════════════════
    async function selectClient(clientId){
      currentClientId=clientId;
      document.getElementById('searchResults').classList.remove('open');
      document.getElementById('dashView').style.display='none';
      document.getElementById('clientView').style.display='block';

      var client=await DB.clients.getById(clientId);
      if(!client)return;
      document.getElementById('searchInput').value=client.raison_sociale;

      var initiales=client.raison_sociale.split(' ').slice(0,2).map(function(w){return w[0];}).join('').toUpperCase();
      var loc=[client.ville,client.code_postal,client.pays].filter(Boolean).join(' · ');
      var h='<div style="display:flex;align-items:center;gap:16px;margin-bottom:8px">';
      h+='<div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#0d9488,#14b8a6);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0">'+initiales+'</div>';
      h+='<div><div style="font-size:20px;font-weight:600;color:#0f2244">'+client.raison_sociale+'</div>';
      h+='<div style="font-size:13px;color:#1a3a6e;opacity:.6;font-family:DM Mono,monospace">'+client.code_client+'</div>';
      if(loc)h+='<div style="font-size:12px;color:#1a3a6e;opacity:.4;margin-top:2px">'+loc+'</div>';
      h+='</div></div>';
      document.getElementById('clientCard').innerHTML=h;

      var stats=await DB.stats.getClientStats(clientId);
      var total=stats?stats.total_projets:0,gagnes=stats?stats.gagnes:0,perdus=stats?stats.perdus:0;
      var enCours=stats?stats.en_cours:0,caGagne=stats?stats.ca_gagne:0,taux=stats?stats.taux_conversion:0;
      var score=calcScore(total,gagnes,taux,caGagne);
      var scoreColor=score>=70?'#059669':score>=40?'#d97706':'#dc2626';
      var scoreLabel=score>=70?'Client fidèle':score>=40?'Client régulier':'Client occasionnel';
      var scoreDesc=score>=70?'Excellent taux de conversion et volume. Client à privilégier.':score>=40?'Activité régulière avec potentiel de développement.':total===0?'Aucun projet enregistré.':'Peu de projets ou faible conversion. À relancer.';

      var kh='<div class="kpi-grid">';
      kh+='<div class="kpi"><div class="kpi-val">'+total+'</div><div class="kpi-label">Demandes</div></div>';
      kh+='<div class="kpi"><div class="kpi-val green">'+gagnes+'</div><div class="kpi-label">Gagnés</div></div>';
      kh+='<div class="kpi"><div class="kpi-val red">'+perdus+'</div><div class="kpi-label">Perdus</div></div>';
      kh+='<div class="kpi"><div class="kpi-val amber">'+taux+'%</div><div class="kpi-label">Conversion</div></div></div>';
      kh+='<div class="kpi-grid" style="grid-template-columns:1fr 1fr;margin-top:12px">';
      kh+='<div class="kpi"><div class="kpi-val">'+formatCA(caGagne)+'</div><div class="kpi-label">CA gagné</div></div>';
      kh+='<div class="kpi"><div class="kpi-val">'+enCours+'</div><div class="kpi-label">En cours</div></div></div>';

      var circ=2*Math.PI*34,offset=circ-(circ*score/100);
      kh+='<div class="score-section"><div class="score-ring"><svg viewBox="0 0 80 80"><circle class="score-ring-bg" cx="40" cy="40" r="34"/>';
      kh+='<circle class="score-ring-fill" cx="40" cy="40" r="34" stroke="'+scoreColor+'" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+offset.toFixed(1)+'"/></svg>';
      kh+='<div class="score-val" style="color:'+scoreColor+'">'+score+'</div></div>';
      kh+='<div class="score-info"><h4>'+scoreLabel+'</h4><p>'+scoreDesc+'</p></div></div>';
      document.getElementById('kpiCard').innerHTML=kh;

      var projets=await DB.projets.getByClient(clientId);
      var ph='<div class="projets-header"><span class="projets-title">Historique des projets</span><span class="projets-count">'+projets.length+' projet'+(projets.length>1?'s':'')+'</span></div>';
      if(projets.length===0){ph+='<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Aucun projet enregistré</div></div>';}
      else{
        ph+='<table class="projets-table"><thead><tr><th>Réf.</th><th>Projet</th><th>Machine</th><th>Montant</th><th>Statut</th><th>Date</th></tr></thead><tbody>';
        projets.forEach(function(p){
          var sc='status-'+(p.statut||'en_cours'),sl=p.statut==='gagne'?'Gagné':p.statut==='perdu'?'Perdu':p.statut==='abandonne'?'Abandonné':'En cours';
          ph+='<tr><td class="mono">'+(p.reference||'—')+'</td><td>'+(p.nom_projet||'—')+'</td><td class="mono">'+(p.type_machine||'')+' '+(p.taille||'')+'</td>';
          ph+='<td class="mono">'+(p.montant_ht?formatCA(p.montant_ht):'—')+'</td><td><span class="status '+sc+'">'+sl+'</span></td><td class="mono">'+(p.date_creation||'—')+'</td></tr>';
        });
        ph+='</tbody></table>';
      }
      document.getElementById('projetsCard').innerHTML=ph;
    }

    function calcScore(t,g,tx,ca){if(t===0)return 0;return Math.round(Math.min(Math.min(t*5,30)+Math.min(tx*.5,40)+Math.min(ca/5000,30),100));}
    function formatCA(v){if(!v||v===0)return'0 €';return Math.round(v).toLocaleString('fr-FR')+' €';}
  </script>
</body>
</html>
